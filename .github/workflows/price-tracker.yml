name: Price Tracker

on:
  schedule:
    # GitHub Actions używa UTC. 10:23 UTC = 12:23 czasu letniego (CEST).
    # Nieokrągła minuta celowo: crony o pełnych godzinach (zwłaszcza :00)
    # trafiają w szczyt obciążenia GitHuba i bywają opóźniane lub POMIJANE.
    # Zimą (CET) odkomentuj drugą linię i zakomentuj pierwszą, żeby zostać przy ~12:23.
    - cron: "23 10 * * *"
    # - cron: "23 11 * * *"
  workflow_dispatch:      # ręczne uruchomienie (zakładka Actions lub FIRE w dashboardzie)
    inputs:
      discovery:
        description: "Discovery (full = szukaj nowych sklepów, skip = tylko monitoring znanych)"
        type: choice
        options: [full, skip]
        default: full

permissions:
  contents: write

concurrency:
  group: price-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Chromium dla Playwright (fallback na sklepy z blokadą botów).
      # Cache ~/.cache/ms-playwright oszczędza ~150 MB pobierania per run.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Run tracker
        env:
          SKIP_DISCOVERY: ${{ github.event.inputs.discovery == 'skip' && '1' || '' }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          # sekret u użytkownika nazywa się TAVILY_KEY; fallback obsługuje obie nazwy
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY || secrets.TAVILY_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CX: ${{ secrets.GOOGLE_CX }}
        run: python tracker.py

      - name: Commit results
        run: |
          git config user.name "price-tracker-bot"
          git config user.email "actions@github.com"
          git add data/ output/ docs/
          git diff --cached --quiet && echo "Brak zmian" && exit 0
          git commit -m "Ceny $(date -u +%F)"
          # Ktoś mógł wypchnąć zmiany w trakcie runu. Przy konflikcie na plikach
          # generowanych (log, dashboardy, xlsx) wygrywa wersja bota ("theirs"
          # w rebase = replayowany commit bota) - jest świeższa, bo run był później.
          git pull --rebase -X theirs
          git push
