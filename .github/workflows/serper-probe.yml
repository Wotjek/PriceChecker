# Diagnostyka: pelna replika joba price-tracker z sonda serpera po kazdym
# etapie. Ustala, w ktorym momencie joba zadania zaczynaja dostawac 403:
#  t0 = po setup-python + requirements (jak dotychczasowe sondy - przechodzily)
#  t1 = po playwright install --with-deps (modyfikuje pakiety systemowe)
#  t2 = po dodatkowych 35 minutach (wiek joba / reputacja IP)
# Do skasowania po zakonczeniu sledztwa.
name: Serper Probe
on: workflow_dispatch

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sonda t0 (po zaleznosciach)
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: |
          echo "IP wyjsciowe: $(curl -s https://api.ipify.org)"
          python3 - <<'EOF'
          import os, requests
          r = requests.post("https://google.serper.dev/shopping",
                            headers={"X-API-KEY": os.environ["SERPER_API_KEY"].strip(),
                                     "Content-Type": "application/json"},
                            json={"q": "30355427076", "gl": "de"}, timeout=20)
          print("t0:", r.status_code, r.text[:80])
          EOF

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Sonda t1 (po playwright --with-deps)
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: |
          python3 - <<'EOF'
          import os, requests
          r = requests.post("https://google.serper.dev/shopping",
                            headers={"X-API-KEY": os.environ["SERPER_API_KEY"].strip(),
                                     "Content-Type": "application/json"},
                            json={"q": "30355427076", "gl": "de"}, timeout=20)
          print("t1:", r.status_code, r.text[:80])
          EOF

      - name: Czekanie 35 minut (wiek joba)
        run: sleep 2100

      - name: Sonda t2 (po 35 minutach)
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: |
          python3 - <<'EOF'
          import os, requests
          r = requests.post("https://google.serper.dev/shopping",
                            headers={"X-API-KEY": os.environ["SERPER_API_KEY"].strip(),
                                     "Content-Type": "application/json"},
                            json={"q": "30355427076", "gl": "de"}, timeout=20)
          print("t2:", r.status_code, r.text[:80])
          EOF
