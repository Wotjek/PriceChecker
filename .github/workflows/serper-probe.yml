# Diagnostyka: czy Serper odrzuca ruch z runnerow GitHub Actions?
# 6 rownoleglych jobow = 6 (zwykle roznych) IP z puli Azure; kazdy robi
# jedno zapytanie i loguje swoj adres wyjsciowy + status odpowiedzi.
# Uruchamiany tylko recznie; do skasowania po zakonczeniu sledztwa.
name: Serper Probe
on: workflow_dispatch

jobs:
  probe:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        n: [1, 2]
    steps:
      - name: Zapytanie testowe z runnera (curl + python requests)
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: |
          echo "IP wyjsciowe runnera: $(curl -s https://api.ipify.org)"
          code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            https://google.serper.dev/search \
            -H "X-API-KEY: $SERPER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"q":"probe"}')
          echo "curl /search: $code"
          pip install -q requests
          python3 - <<'EOF'
          import os, requests
          k = os.environ["SERPER_API_KEY"]
          UA = ("Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                "AppleWebKit/537.36 (KHTML, like Gecko) "
                "Chrome/124.0.0.0 Safari/537.36")
          for ua in (None, UA):
              h = {"X-API-KEY": k, "Content-Type": "application/json"}
              if ua:
                  h["User-Agent"] = ua
              r = requests.post("https://google.serper.dev/shopping",
                                headers=h, json={"q": "probe", "gl": "de"},
                                timeout=20)
              print(f"python /shopping UA={'Mozilla' if ua else 'domyslny'}: "
                    f"{r.status_code} {r.text[:80]}")
          EOF
