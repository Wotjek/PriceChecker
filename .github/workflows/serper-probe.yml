# Diagnostyka: dlaczego tracker dostaje 403 od Serpera, skoro identyczne
# reczne zapytania przechodza? Trzy warianty na runnerze:
#  - tracker: checkout + requirements.txt (Brotli!) + tracker.serper_shopping_items
#  - brotli:  golasy requests + Brotli (Accept-Encoding: br)
#  - plain:   golasy requests bez Brotli
# Do skasowania po zakonczeniu sledztwa.
name: Serper Probe
on: workflow_dispatch

jobs:
  probe:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [tracker, brotli, plain]
    steps:
      - uses: actions/checkout@v4
        if: matrix.variant == 'tracker'
      - name: Instalacja zaleznosci
        run: |
          if [ "${{ matrix.variant }}" = "tracker" ]; then
            pip install -q -r requirements.txt
          elif [ "${{ matrix.variant }}" = "brotli" ]; then
            pip install -q requests Brotli
          else
            pip install -q requests
          fi
      - name: Zapytanie testowe
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          VARIANT: ${{ matrix.variant }}
        run: |
          echo "IP wyjsciowe runnera: $(curl -s https://api.ipify.org)"
          python3 - <<'EOF'
          import os
          v = os.environ["VARIANT"]
          key = os.environ["SERPER_API_KEY"].strip()
          if v == "tracker":
              import tracker
              items = tracker.serper_shopping_items("salsa cutthroat grx",
                                                    key, "de")
              print("wariant tracker: items =", len(items))
              print("log trackera:", tracker.LOG_BUFFER)
          else:
              import requests
              r = requests.post("https://google.serper.dev/shopping",
                                headers={"X-API-KEY": key,
                                         "Content-Type": "application/json"},
                                json={"q": "salsa cutthroat grx", "gl": "de"},
                                timeout=20)
              print(f"wariant {v}: {r.status_code} {r.text[:80]}")
              print("wyslane Accept-Encoding:",
                    r.request.headers.get("Accept-Encoding"))
          EOF
