# Plik zarządzany także z dashboardu (zakładka Konfiguracja)
settings:
  github_repo: Wotjek/PriceChecker
  branch: main
  discovery: weekly
  serpapi_countries:
    - de
    - pl
    - it
  # budzet zapytan Google Shopping per run (blind spoty; glownie Serper);
  # plan per kraj potrafi zjesc do 3 pobran (str. 2 feedu, druga fraza)
  shopping_budget: 18
  # szersza Europa dla Serpera (osobna pula 2500 darmowych zapytan)
  discovery_countries:
    - de
    - pl
    - it
    - cz
    - fr
    - es
    - nl
products:
  - variant_strict: true
    id: FM2797
    name: Salsa Cutthroat C Frameset
    variant: "56"
    queries:
      - Salsa Cutthroat C frameset
      - Salsa Cutthroat Rahmenset
      - "\"FM2797\" salsa"
      - Salsa Cutthroat telaio carbonio
      - Salsa Cutthroat cadre bikepacking
      - Salsa Cutthroat cuadro
    seed_urls:
      - https://stateofbike.it/negozio-bikepacking/salsa-cutthroat-frameset/
      - https://www.bikejamming.it/en/30986-16664salsa-cutthroat-carbon-frameset-tour-divide-bikepacking.html
  - id: FARGO-TI
    name: Salsa Fargo Ti Frameset
    # rozmiar Medium; sklepy oznaczaja go roznie (M / Medium) - bez
    # variant_strict, bo cena ramy jest ta sama dla wszystkich rozmiarow
    variant: medium
    # rama+widelec ~3300-3900 EUR; min odcina czesci/akcesoria, max caly rower
    min_pln: 6000
    max_pln: 20000
    require_tokens:
      - fargo
      - fargo ti|titan|tytan|titanio|titane
    queries:
      - Salsa Fargo Ti frameset
      - Salsa Fargo Ti Rahmenset
      - "\"FM0872\" salsa"
      - Salsa Fargo Ti rama tytanowa
      - Salsa Fargo Ti telaio titanio
      - Salsa Fargo Ti cadre titane
    seed_urls:
      - https://rat-bikes.eu/salsa-fargo-ti-mtb-frameset-27-5-29.html
  - id: FARGO-STEEL
    name: Salsa Fargo Steel Frameset 27.5+/29 Gunmetal Grey
    # rozmiar Medium; cena ramy taka sama dla rozmiarow - bez strict
    variant: medium
    # stalowa rama ~1200 EUR (wyprzedaze 2024 od ~600 USD); max odcina
    # wersje Ti (min 6000 PLN) i caly rower
    min_pln: 2000
    max_pln: 7500
    # gunmetal = kolor tylko tej wersji stalowej - odcina czarna i Ti
    require_tokens:
      - fargo
      - gunmetal
    queries:
      - Salsa Fargo Steel frameset gunmetal grey
      - Salsa Fargo Steel Rahmenset gunmetal
      - "\"FM0869\" salsa"
      - Salsa Fargo rama stalowa gunmetal
      - Salsa Fargo telaio acciaio
      - Salsa Fargo cadre acier
    seed_urls:
      - https://www.bike-packing.de/en/salsa-fargo-steel-frameset-275-29-gunmetal-grey
