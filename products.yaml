# Plik zarządzany także z dashboardu (zakładka Konfiguracja)
settings:
  github_repo: Wotjek/PriceChecker
  branch: main
  discovery: weekly
  serpapi_countries:
    - de
    - pl
    - it
  # budzet zapytan Google Shopping per run (blind spoty; glownie Serper);
  # plan per kraj potrafi zjesc do 3 pobran (str. 2 feedu, druga fraza)
  shopping_budget: 18
  # szersza Europa dla Serpera (osobna pula 2500 darmowych zapytan)
  discovery_countries:
    - de
    - pl
    - it
    - cz
    - fr
    - es
    - nl
products:
  - id: Cane Creek 40 IS41/IS52
    name: Cane Creek 40 IS41/IS52
    ean: "840226078472"
    queries:
      - Cane Creek 40 IS41 IS52 tapered headset
      - Cane Creek 40 Steuersatz tapered
      - Cane Creek 40 stery IS41 IS52
      - Cane Creek 40 serie sterzo IS41
  - id: Canyon S15 VCLS 2.0
    name: Canyon S15 VCLS 2.0
    # bylo blednie skonfigurowane jako S14 (inna dlugosc sztycy dla innego
    # rozmiaru ramy) - poprawiono 2026-07-21; ciaglosc historii cen dla
    # tego produktu przerwana, bo pod starym id/tokenem "s14" mogly trafiac
    # sie oferty innego fizycznie produktu
    require_tokens:
      - s15
    # widelki: ~200-260 EUR rynek wtorny/allegro-podobne oferty; szeroki
    # margines na wyprzedaze i zestawy
    min_pln: 400
    max_pln: 1800
    queries:
      - Canyon S15 VCLS 2.0 CF seatpost
      - Canyon S15 VCLS Sattelstütze
      - Canyon S15 VCLS 2.0 27.2mm CF Seatpost
      - Canyon S15 VCLS sztyca
  - id: Ritchey WCS Carbon ErgoMax
    name: Ritchey WCS Carbon ErgoMax
    ean: "30355427076"
    variant: "42"
    min_pln: 600
    require_tokens:
      - carbon
      # wcs odcina wyzsza linie Superlogic (osobny produkt) i tansza Comp
      - wcs
    queries:
      - Ritchey WCS Carbon ErgoMax handlebar
      - Ritchey WCS ErgoMax Carbon Lenker
      - Ritchey WCS Carbon ErgoMax 42cm
      - Ritchey WCS ErgoMax carbon kierownica
      - Ritchey WCS ErgoMax carbon manubrio
      - Ritchey WCS ErgoMax carbone cintre
  - id: SUPERLOGIC-ERGOMAX
    name: Ritchey Superlogic ErgoMax 42cm
    variant: "42"
    # MSRP ~350 EUR (~1500 PLN); min odcina czesci, max zestawy/kokpity
    min_pln: 700
    max_pln: 2500
    # superlogic odroznia od linii WCS Carbon (osobny produkt) i Comp
    require_tokens:
      - superlogic
    queries:
      - Ritchey Superlogic ErgoMax handlebar
      - Ritchey Superlogic ErgoMax Lenker carbon
      - Ritchey Superlogic ErgoMax 42cm
      - Ritchey Superlogic ErgoMax kierownica
      - Ritchey Superlogic ErgoMax manubrio
      - Ritchey Superlogic ErgoMax cintre carbone
    seed_urls:
      - https://www.tradeinn.com/bikeinn/en/ritchey-superlogic-ergomax-handlebar/142611487/p
  - id: IBS-V1X
    name: Infinity Bike Seat V1X
    # marka amerykanska (sprzedaz glownie direct + dealerzy US) - worldwide
    # jak Lauf; wysylke do PL weryfikuje uzytkownik
    worldwide: true
    # $387-427 (~1400-1550 PLN), promocje "-$50"; min odcina akcesoria
    min_pln: 900
    max_pln: 2200
    # v1x = seria Vegan; odcina pozostale serie (E1X/E2X/A1X/NX)
    require_tokens:
      - infinity
      - v1x
    queries:
      - Infinity Bike Seat V1X saddle
      - Infinity Vegan V1X saddle
      - "\"IBS-V1X\""
      - Infinity Bike Seat V1X Sattel
      - siodelko Infinity V1X
    seed_urls:
      - https://www.cyclingupgrades.com/products/new-_infinity_vegan_v1x_black_7x7mm_stainless_rails_saddle06242025-1104-05
      - https://infinitybikeseat.com/product-category/bike-seats/

