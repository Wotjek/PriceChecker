  - id: GARBARUK-40T-AERO
    name: Garbaruk MTB TM Aero 40T SRAM XX/XX SL (okrągła, czarna)
    ean: "590744166698"
    variant: "40"
    # rodzimy polski producent - ceny bezposrednio w PLN (koronka ovalna
    # 40T ~389 PLN u Cyklomanii - okragla zwykle podobnie lub taniej)
    min_pln: 200
    max_pln: 700
    # UWAGA: Garbaruk sprzedaje tez wersje OWALNA tego samego rozmiaru pod
    # bardzo podobna nazwa - nie da sie tu odfiltrowac "ovalna" bez ryzyka
    # odrzucenia prawidlowych ofert (round bywa domyslny, bez etykiety w
    # tytule). Rozroznienie opiera sie na EAN (miekkie dopasowanie) i
    # dokladnym seed URL ponizej - warto zerkac na audyt tego produktu.
    require_tokens:
      - garbaruk
      - aero
    queries:
      - Garbaruk MTB Aero chainring 40T thread mount
      - Garbaruk koronka Aero 40T okragla
      - Garbaruk Kettenblatt Aero 40T rund
